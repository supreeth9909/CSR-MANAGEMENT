{% extends "admin/base_site.html" %}
{% load static %}

{% block nav-global %}
{{ block.super }}
<style>
  .admin-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #ffffff;
    color: #333;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    text-decoration: none;
    cursor: pointer;
    margin-bottom: 15px;
  }
  .admin-back-btn:hover {
    background: #f5f5f5;
  }
  .admin-back-btn svg {
    width: 14px;
    height: 14px;
  }
</style>
{% endblock %}

{% block content_title %}
{{ block.super }}
<button type="button" class="admin-back-btn" onclick="history.back()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M19 12H5M12 19l-7-7 7-7"/>
  </svg>
  Back
</button>
{% endblock %}
