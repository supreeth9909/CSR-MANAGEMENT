{% extends 'base.html' %}
{% block title %}CampusOne - {{ title }}{% endblock %}

{% block content %}
<style>
  .form-container {
    padding: 24px 32px;
    max-width: 600px;
    margin: 0 auto;
  }
  .page-header {
    margin-bottom: 24px;
  }
  .page-header h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1e293b;
    margin: 0;
  }
  .form-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #1e293b;
  }
  .form-group input:focus {
    outline: none;
    border-color: #3b82f6;
  }
  .btn-primary {
    padding: 10px 20px;
    background: #3b82f6;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover {
    background: #2563eb;
  }
  .btn-secondary {
    padding: 10px 20px;
    background: #f3f4f6;
    color: #374151;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 10px;
  }
  .btn-secondary:hover {
    background: #e5e7eb;
  }
</style>

<div class="form-container">
  <div class="page-header">
    <h1>{{ title }}</h1>
  </div>

  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Slot Name</label>
        <input type="text" id="name" name="name" value="{{ slot.name|default:'' }}" required placeholder="e.g., Breakfast, Lunch Break">
      </div>
      <div class="form-group">
        <label for="start_time">Start Time</label>
        <input type="time" id="start_time" name="start_time" value="{{ slot.start_time|time:'H:i'|default:'' }}" required>
      </div>
      <div class="form-group">
        <label for="end_time">End Time</label>
        <input type="time" id="end_time" name="end_time" value="{{ slot.end_time|time:'H:i'|default:'' }}" required>
      </div>
      <button type="submit" class="btn-primary">Save</button>
      <a href="{% url 'manage_break_slots' %}" class="btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
