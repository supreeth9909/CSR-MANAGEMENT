{% extends 'base.html' %}
{% block title %}CampusOne - Edit Session{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="glass-strong p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="fw-semibold">Edit Attendance Session</span>
          <span class="badge badge-soft">CampusOne</span>
        </div>
        <form method="post" class="row g-3">
          {% csrf_token %}
          {{ form.as_p }}
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-smart text-white fw-semibold" type="submit">Save Changes</button>
            <a class="btn btn-outline-smart" href="{% url 'attendance_home' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
